name: maps_place_picker
description: >-
  Flutter package for picking places on a Google Map — pin drag, autocomplete
  search, area restriction and dark mode. Actively maintained fork.
version: 1.0.0
homepage: https://github.com/chjsoliveira/maps_place_picker
repository: https://github.com/chjsoliveira/maps_place_picker
issue_tracker: https://github.com/chjsoliveira/maps_place_picker/issues

topics:
  - maps
  - google-maps
  - location
  - place-picker
  - geocoding

screenshots:
  - description: 'Animated preview of the Maps Place Picker widget'
    path: doc/preview.gif

environment:
  sdk: ">=3.9.2 <4.0.0"
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  google_api_headers: ^5.1.0
  google_maps_flutter: ^2.12.1
  http: ^1.2.0
  provider: ^6.1.2
  tuple: ^2.0.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  http: ^1.2.0

flutter:

false_secrets:
  - /example/lib/keys.dart
  - /example/android/app/src/main/AndroidManifest.xml
  - /example/ios/Runner/AppDelegate.swift

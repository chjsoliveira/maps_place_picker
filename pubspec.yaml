name: maps_place_picker
description: A Flutter plugin which provides 'Picking Place' using Google Maps
  widget. Actively maintained fork with bug fixes and compatibility updates.
version: 3.2.0
homepage: https://github.com/chjsoliveira/maps_place_picker

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^14.0.2
  google_api_headers: ^5.1.0
  google_maps_flutter: ^2.12.1
  flutter_google_maps_webservices: ^1.1.1
  http: ^1.1.0
  provider: ^6.0.5
  tuple: ^2.0.2
  uuid: ^4.0.0
  package_info_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter: null

false_secrets:
  - /example/lib/keys.dart
  - /example/android/app/src/main/AndroidManifest.xml
  - /example/ios/Runner/AppDelegate.swift
